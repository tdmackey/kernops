# Two-stage kernel CI — see docs/nv-kernels-automation.md.
#
#   Stage A "packaging"   — we ship DEBS: reconstruct each base from the
#                           monorepo record, build with Ubuntu packaging,
#                           verify the PE vmlinuz, keep the artifacts.
#   Stage B "correctness" — we ship a KERNEL: virtme-ng build+boot and
#                           kselftests (mm dma iommu locking) at 4k AND 64k.
#                           (NV-Kernels kernel-build.yml model; configs are
#                           generated at run time, not vendored.)
#   plus patchscan        — every PR: -x trailers resolve upstream, and no
#                           upstream Fixes: for our picks are missing.
#
# Activation requirements (not yet live):
#   - repo pushed to GitHub
#   - self-hosted Graviton/amd64 runners (workflows/aws-runners/ terraform),
#     labels [self-hosted, kernel-builder, arm64|amd64]; the AMI should carry a
#     bare mirror of the Launchpad kernel repo at /srv/mirrors/noble.git
#     (KERNEL_MIRROR below) — cold-cloning 4.5 GB per job is not a plan.
#   - until then, stage B also runs on GitHub-hosted ubuntu-24.04-arm
#     (4 vCPU: slow but functional; flip the runs-on lines).

name: kernel-ci
on:
  pull_request:
    paths:
      - 'kernel/**'
      - 'modules/**'
      - 'scripts/**'
      - 'env/**'
      - 'tools/dashboard/**'
      - 'tools/patchscan/**'
      - 'tools/treadmill/**'
      - 'tests/**'
      - 'Makefile'
      - '.github/workflows/kernel-ci.yml'
  workflow_dispatch:
    inputs:
      base:
        description: 'single base to run (empty = all)'
        required: false

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}-${{ inputs.base || 'all' }}
  cancel-in-progress: true

env:
  KERNEL_MIRROR: /srv/mirrors/noble.git
  LP_URL: https://git.launchpad.net/~ubuntu-kernel/ubuntu/+source/linux/+git/noble

jobs:
  static:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Static checks
        run: |
          sudo apt-get -qq update
          sudo apt-get -qq install -y shellcheck
          GB200_REPO_ROOT="$GITHUB_WORKSPACE" make syntax yaml workflow-check dashboard-check tests shellcheck

  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      bases: ${{ steps.m.outputs.bases }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - id: m
        run: |
          want='${{ inputs.base }}'
          bases=$(awk -F'\t' '!/^#/ && NF>=2 {print $1}' kernel/upstream-base.txt)
          [ -n "$want" ] && bases="$want"
          echo "bases=$(echo $bases | jq -Rc 'split(" ")')" >> "$GITHUB_OUTPUT"

  packaging:
    needs: prepare
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        base: ${{ fromJson(needs.prepare.outputs.bases) }}
        arch: [arm64, amd64]
        include:
          - arch: arm64
            runner: [self-hosted, kernel-builder, arm64]
          - arch: amd64
            runner: [self-hosted, kernel-builder, amd64]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Reconstruct tree from record
        run: |
          git -C "$KERNEL_MIRROR" fetch origin "$LP_URL" || git -C "$KERNEL_MIRROR" fetch --all
          REPO="$KERNEL_MIRROR" ./scripts/apply-series.sh --check "${{ matrix.base }}"
          REPO="$KERNEL_MIRROR" ./scripts/apply-series.sh "${{ matrix.base }}" "$RUNNER_TEMP/tree"
      - name: Module source preflight
        run: ./scripts/check-module-sources.sh "${{ matrix.base }}" "${{ matrix.arch }}" noble
      - name: Build debs (fast profile)
        working-directory: ${{ runner.temp }}/tree
        run: |
          . "$GITHUB_WORKSPACE/scripts/lib/arch.sh"
          ARCH=$(gb200_arch_normalize "${{ matrix.arch }}")
          FLAVOUR=$(gb200_arch_default_flavour "${{ matrix.base }}" "$ARCH")
          export DEB_BUILD_OPTIONS="parallel=$(nproc)"
          export PATH=/usr/lib/ccache:$PATH CCACHE_BASEDIR="$PWD"
          fakeroot debian/rules clean
          fakeroot debian/rules binary-headers "binary-$FLAVOUR" \
            do_tools=false skipdbg=true skipabi=true skipmodule=true
      - name: Kernel image format check
        run: |
          . "$GITHUB_WORKSPACE/scripts/lib/arch.sh"
          ARCH=$(gb200_arch_normalize "${{ matrix.arch }}")
          pattern=$(gb200_arch_file_grep "$ARCH")
          deb=$(ls "$RUNNER_TEMP"/linux-image-*_"$ARCH".deb | head -1)
          dpkg-deb --fsys-tarfile "$deb" | tar -xO --wildcards './boot/vmlinuz-*' > /tmp/vmlinuz
          file /tmp/vmlinuz | grep -Eq "$pattern" || { file /tmp/vmlinuz; exit 1; }
      - name: Module matrix (DOCA -> nvidia-open, ordered)
        run: |
          ARCH="${{ matrix.arch }}"
          mkdir -p "$RUNNER_TEMP/debs"
          shopt -s nullglob
          debs=( "$RUNNER_TEMP"/*_"$ARCH".deb "$RUNNER_TEMP"/*_all.deb )
          [ "${#debs[@]}" -gt 0 ] || { echo "!! no debs for $ARCH in $RUNNER_TEMP" >&2; exit 1; }
          cp "${debs[@]}" "$RUNNER_TEMP/debs/"
          ./scripts/build-modules.sh "${{ matrix.base }}" "$RUNNER_TEMP/debs" noble "$ARCH"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: debs-${{ matrix.base }}-${{ matrix.arch }}
          path: |
            ${{ runner.temp }}/debs/*.deb
            ${{ runner.temp }}/debs/modules/*.deb
          retention-days: 14

  correctness:
    needs: prepare
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        base: ${{ fromJson(needs.prepare.outputs.bases) }}
        arch: [arm64, amd64]
        pagesize: [4k, 64k]
        exclude:
          - arch: amd64
            pagesize: 64k
        include:
          - arch: arm64
            runner: [self-hosted, kernel-builder, arm64]
          - arch: amd64
            runner: [self-hosted, kernel-builder, amd64]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Reconstruct tree from record
        run: |
          REPO="$KERNEL_MIRROR" ./scripts/apply-series.sh "${{ matrix.base }}" "$RUNNER_TEMP/tree"
      - name: Install virtme-ng + deps
        run: |
          sudo apt-get -qq update
          QEMU=qemu-system-arm
          [ "${{ matrix.arch }}" = amd64 ] && QEMU=qemu-system-x86
          sudo apt-get -qq install -y build-essential flex bison libssl-dev libelf-dev \
            bc busybox-static cpio dwarves zstd "$QEMU" python3-pip
          pip install --break-system-packages virtme-ng
      - name: Configure (generated, not vendored)
        working-directory: ${{ runner.temp }}/tree
        run: |
          make defconfig
          if [ "${{ matrix.arch }}" = "arm64" ] && [ "${{ matrix.pagesize }}" = "64k" ]; then
            ./scripts/config --enable CONFIG_ARM64_64K_PAGES
          fi
          ./scripts/config --disable CONFIG_WERROR
          ./scripts/config --disable SYSTEM_TRUSTED_KEYS
          ./scripts/config --disable SYSTEM_REVOCATION_KEYS
          make olddefconfig
      - name: Build + boot
        working-directory: ${{ runner.temp }}/tree
        run: |
          vng -vb
          vng -v -m 4G -- uname -a
      - name: kselftests (mm dma iommu locking)
        working-directory: ${{ runner.temp }}/tree
        run: |
          make headers_install
          make -j"$(nproc)" -C tools/testing/selftests \
            TARGETS="mm dma iommu locking" INSTALL_PATH="$PWD/tests" all install
          vng -v -m 4G -- ./tests/run_kselftest.sh --summary

  patchscan:
    if: github.event_name == 'pull_request'
    runs-on: [self-hosted, kernel-builder, arm64]
    needs: prepare
    permissions:
      contents: read
    strategy:
      matrix:
        base: ${{ fromJson(needs.prepare.outputs.bases) }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Scan series provenance + missing Fixes
        run: |
          pip install --break-system-packages gitpython colorama
          tag=$(awk -F'\t' -v b="${{ matrix.base }}" '$1==b{print $2}' kernel/upstream-base.txt)
          REPO="$KERNEL_MIRROR" ./scripts/apply-series.sh "${{ matrix.base }}" "$RUNNER_TEMP/scan"
          cd "$RUNNER_TEMP/scan"
          git remote add upstream https://kernel.googlesource.com/pub/scm/linux/kernel/git/torvalds/linux.git
          git fetch --no-tags upstream master
          python3 "$GITHUB_WORKSPACE/tools/patchscan/patchscan" "$tag..HEAD" upstream master
